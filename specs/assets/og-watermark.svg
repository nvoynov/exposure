<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <style>
    /* System viewer fix: displays dark backdrop only when opened as a standalone image file */
    :root { background-color: #121212; }
    .wm-element { fill: none; stroke: #FFFFFF; stroke-linecap: round; stroke-linejoin: round; }
    .wm-matte { fill: #FFFFFF; fill-opacity: 0.12; }
  </style>

  <!-- Minimalist focus screen watermark overlay without central ticks -->
  <g opacity="0.7">
    <!-- Outer rectangular viewfinder corners -->
    <path class="wm-element" d="M2,18 V8 H8 M56,8 H62 V18 M62,46 V56 H56 M8,56 H2 V46" stroke-width="1.5" />
    
    <!-- Central split-image rangefinder optics -->
    <!-- Outer microprism collar with light matte fill -->
    <circle class="wm-element wm-matte" cx="32" cy="32" r="18" stroke-width="2" />
    <!-- Inner rangefinder wedge circle -->
    <circle class="wm-element" cx="32" cy="32" r="10" stroke-width="2" />
    <!-- Vertical split line inside the center circle -->
    <line class="wm-element" x1="32" y1="22" x2="32" y2="42" stroke-width="2" />
  </g>
</svg>
