<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="4" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#FAFAFA" />

  <!-- Scattered Chaotic Photo Layers -->
  <g transform="translate(150, 100) rotate(-4, 175, 55)" filter="url(#shadow)">
    <rect x="0" y="0" width="350" height="230" fill="#EEEEEE" stroke="#FFFFFF" stroke-width="6" />
    <text x="175" y="120" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#888888">[ Print 01 - Muted Background ]</text>
  </g>
  <g transform="translate(650, 80) rotate(5, 160, 110)" filter="url(#shadow)">
    <rect x="0" y="0" width="320" height="420" fill="#E5E5E5" stroke="#FFFFFF" stroke-width="6" />
    <text x="160" y="215" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#888888">[ Print 02 - Portrait Vertical ]</text>
  </g>
  <g transform="translate(200, 300) rotate(-2, 180, 120)" filter="url(#shadow)">
    <rect x="0" y="0" width="360" height="240" fill="#DCDCDC" stroke="#FFFFFF" stroke-width="6" />
    <text x="180" y="125" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#888888">[ Print 03 ]</text>
  </g>
  <g transform="translate(700, 280) rotate(3, 170, 110)" filter="url(#shadow)">
    <rect x="0" y="0" width="340" height="220" fill="#D2D2D2" stroke="#FFFFFF" stroke-width="6" />
    <text x="170" y="115" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#888888">[ Print 04 ]</text>
  </g>
  <g transform="translate(380, 110) rotate(-1, 225, 155)" filter="url(#shadow)">
    <rect x="0" y="0" width="450" height="310" fill="#CCCCCC" stroke="#FFFFFF" stroke-width="8" />
    <text x="225" y="160" font-family="sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#444444">[ Active Series Hero Shot 05 ]</text>
  </g>

  <!-- Dark Watermark Overlay with WHITE GLOW BACKGROUND (No central ticks) -->
  <g transform="translate(1110, 540)">
    <!-- WHITE GLOW HALO BACKING LAYER -->
    <g fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2,18 V8 H8 M56,8 H62 V18 M62,46 V56 H56 M8,56 H2 V46" stroke-width="4" />
      <circle cx="32" cy="32" r="18" fill="#FFFFFF" fill-opacity="0.9" stroke-width="4.5" />
      <circle cx="32" cy="32" r="10" stroke-width="4.5" />
      <line x1="32" y1="22" x2="32" y2="42" stroke-width="4.5" />
    </g>
    <!-- FRONT DARK OPTICS ARTWORK -->
    <g fill="none" stroke="#1A1A1A" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2,18 V8 H8 M56,8 H62 V18 M62,46 V56 H56 M8,56 H2 V46" stroke-width="1.5" />
      <circle cx="32" cy="32" r="18" stroke-width="2" />
      <circle cx="32" cy="32" r="10" stroke-width="2" />
      <line x1="32" y1="22" x2="32" y2="42" stroke-width="2" />
    </g>
  </g>
</svg>
