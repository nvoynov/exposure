<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <style>
    .screen-element { fill: none; stroke: #1A1A1A; stroke-width: 1.2; stroke-linecap: round; }
    .microprism-ring { fill: #1A1A1A; opacity: 0.12; }
    .wedge-background { fill: #FFFFFF; }
    
    @media (prefers-color-scheme: dark) {
      .screen-element { stroke: #FFFFFF; }
      .microprism-ring { fill: #FFFFFF; opacity: 0.12; }
      .wedge-background { fill: #121212; }
    }
  </style>

  <!-- Rectangular focus screen corners (1px horizontal offset, 4px vertical offset) -->
  <path class="screen-element" d="M1,9 V4 H6 M26,4 H31 V9 M31,23 V28 H26 M6,28 H1 V23" stroke-width="1" />
  
  <!-- Outer microprism collar with light matte fill -->
  <circle class="microprism-ring" cx="16" cy="16" r="9" />
  <circle class="screen-element" cx="16" cy="16" r="9" />
  
  <!-- Central split-image rangefinder (Dodane wedges) -->
  <circle class="wedge-background" cx="16" cy="16" r="5" />
  <circle class="screen-element" cx="16" cy="16" r="5" />
  
  <!-- Vertical split line inside the center circle -->
  <line class="screen-element" x1="16" y1="11" x2="16" y2="21" />
</svg>

