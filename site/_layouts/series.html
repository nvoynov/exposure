---
layout: default
---

<article class="album-container">
  <header class="album-page-title">
    <h2>{{ page.title }}</h2>
  </header>
  
  <div class="album-editorial-flow">
    <!-- Smart Floating Text Column -->
    <div class="album-editorial-block">
      <div class="album-text-content">
        {{ content }}
        
        {% if page.tags and page.tags.size > 0 %}
          <div class="series-meta-tags">
            {% for tag in page.tags %}
              <span class="meta-tag-item">#{{ tag }}</span>
            {% endfor %}
          </div>
        {% endif %}
      </div>
    </div>

    <!-- Individual Photo Tiles -->
    {% for photo in page.photos %}
      <div class="photo-item" 
           data-index="{{ forloop.index0 }}"
           data-full="{{ '/assets/gallery/' | relative_url }}{{ page.slug }}/full/{{ photo.filename }}"
           data-title="{% if photo.title != photo.filename and photo.title != "" %}{{ photo.title }}{% endif %}">
        <img src="{{ '/assets/gallery/' | relative_url }}{{ page.slug }}/thumbs/{{ photo.thumbnail }}" alt="{{ photo.title }}" loading="lazy">
      </div>
    {% endfor %}
  </div>
</article>

<!-- Include the global shared lightbox component layout -->
{% include lightbox.html %}

<style>
  .album-container {
    max-width: 1000px;
    margin: 0 auto;
    padding-top: 1rem;
    overflow: hidden; /* Safeguard against any micro-scrollbars due to negative margins */
  }

  /* Series Title */
  .album-page-title {
    text-align: left;
    margin-bottom: 3.5rem;
  }

  .album-page-title h2 {
    font-weight: 300;
    font-size: 1.5rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin: 0;
    color: #1a1a1a;
  }

  /* 
     THE TRUE MAGAZINE WRAPPING:
     Using standard block context combined with a negative margin trick.
     This perfectly swallows the trailing 3% gaps on the right viewport edge.
  */
  .album-editorial-flow {
    display: block; 
    width: calc(100% + 3%); /* Expands the track to hide the outer margin */
    margin-right: -3%;      /* Pulls the outer boundary right */
    box-sizing: border-box;
  }

  /* Smart Floating Text Column - Exactly 1/3 of the row minus its right gap */
  .album-editorial-block {
    float: left;
    width: 30.333%;
    margin-right: 3%;
    margin-bottom: 30px;
    text-align: left;
    box-sizing: border-box;
  }

  .album-text-content {
    color: #444;
    font-size: 0.92rem;
    line-height: 1.75;
  }

  .album-text-content p {
    margin-top: 0;
    margin-bottom: 1.2rem;
  }
  .album-text-content p:last-child {
    margin-bottom: 0;
  }

  .series-meta-tags {
    margin-top: 2.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    opacity: 0.5;
    font-size: 0.8rem;
    letter-spacing: 0.5px;
  }
  .meta-tag-item {
    color: #555;
    cursor: default;
  }

  /* 
     PHOTO ITEMS:
     Strict width allocation protects the 3-column distribution line.
     aspect-ratio and overflow guarantee images remain true 3:2 horizontally,
     never stretching vertically or deforming based on text length.
  */
  .photo-item {
    float: left;
    width: 30.333%;
    margin-right: 3%;
    margin-bottom: 30px;
    aspect-ratio: 3 / 2;
    overflow: hidden;
    background-color: #f5f5f5;
    cursor: pointer;
    box-sizing: border-box;
  }

  .photo-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: opacity 0.2s ease;
  }

  .photo-item:hover img {
    opacity: 0.85;
  }

  /* Standard clearfix to reset floats gracefully at the end of the script data */
  .album-editorial-flow::after {
    content: "";
    clear: both;
    display: table;
  }

  /* Responsive layout fallback for tablets (2 columns layout) */
  @media (max-width: 850px) {
    .album-editorial-flow {
      margin-right: -4%;
      width: calc(100% + 4%);
    }
    .album-editorial-block {
      float: none;
      width: 100%;
      margin-right: 0;
      margin-bottom: 2.5rem;
    }
    .photo-item {
      width: 46%;
      margin-right: 4%;
    }
  }

  /* Responsive layout fallback for mobile phones (Single column stack) */
  @media (max-width: 550px) {
    .album-editorial-flow {
      margin-right: 0;
      width: 100%;
    }
    .photo-item {
      width: 100%;
      margin-right: 0;
      margin-bottom: 20px;
    }
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const seriesPhotos = [
      {% for photo in page.photos %}
        {
          "fullUrl": "{{ '/assets/gallery/' | relative_url }}{{ page.slug }}/full/{{ photo.filename }}",
          "title": "{% if photo.title != photo.filename and photo.title != "" %}{{ photo.title }}{% endif %}",
          "filename": "{{ photo.filename }}",
          "slug": "{{ page.slug }}" /* Injects the parent directory slug name safely */
        }{% unless forloop.last %},{% endunless %}
      {% endfor %}
    ];

    document.querySelectorAll('.photo-item').forEach((item, index) => {
      item.addEventListener('click', () => {
        window.openLightboxWithIndex(index, seriesPhotos);
      });
    });

    setTimeout(() => {
      window.checkInboundDeepLinkHash(seriesPhotos);
    }, 120);
  });
</script>
