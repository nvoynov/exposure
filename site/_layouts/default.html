<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  {% seo %}
  {% include analytics.html %}
  <link rel="icon" type="image/svg+xml" sizes="any" href="{{ '/favicon.svg?v=3' | absolute_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <div class="site-container">

    <header class="site-header">
      <div class="site-title">
        <h1>
          <a href="{{ '/' | relative_url }}">
            Nikolay Voynov
            <img src="{{ '/glyph.svg' | relative_url }}" class="header-divider-icon" alt="" />
            Exposure
          </a>
        </h1>
      </div>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}" class="nav-link">Main</a>
        <a href="{{ '/series/' | relative_url }}" class="nav-link">Series</a>
        <a href="{{ '/about/' | relative_url }}" class="nav-link">About</a>
      </nav>
    </header>

    <main>
      <!-- Standard decoupled entry point: clean injection of any down-stream templates -->
      {{ content }}
    </main>

    <footer>
      <p>&copy; {{ "now" | date: "%Y" }} {{ site.author_name }}. All rights reserved.</p>
      <p style="font-size: 0.75rem; opacity: 0.6; margin-top: 5px;">
        No images or text on this site may be reproduced or transmitted in any form without prior written permission.
      </p>
    </footer>

  </div>

  <!-- site/_layouts/default.html -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // Resolves the absolute sw path relative to the dynamic relative Jekyll base root
        const swUrl = "{{ '/sw.js' | relative_url }}";
        
        navigator.serviceWorker.register(swUrl)
          .then((reg) => {
            console.log('Service Worker live. Scope:', reg.scope);
            // Check for updates to manifest on page load to trigger automatic activation sync
            reg.update();
          })
          .catch((err) => console.error('Service Worker setup stalled:', err));
      });
    }
  </script>

</body>
</html>
