url: "" # the base hostname & protocol for your site, e.g. http://example.com
baseurl: "" # the subpath of your site, e.g. /blog
title: "Nikolay Voynov. Exposure" # the name of your site, e.g. ACME Corp.
author_name: Nikolay Voynov
author_email: nvoynov@gmail.com
author_location: Kyiv, Ukraine

# GLOBAL OPEN GRAPH SPECIFICATIONS
# This image will be shown on Facebook when sharing the main home page link
description: "An open digital archive of curated photographic series exploring landscape geometry, isolation, and light."

collections:
  series:
    output: true
    permalink: /series/:slug/

source: site
destination: site/_site

# Active SEO plugins
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# Base URL of your live website (Required for sitemap generation)
url: "https://nvoynov.github.io"
# Base path if your site is inside a subfolder, e.g., "/web-exposure"
baseurl: "/exposure" 

# FIX: Manually specify repository to bypass local GitHub API environment checks
repository: "nvoynov/exposure"

# Sass Preprocessor Configuration
sass:
  sass_dir: assets/css
