<script>
  window.activeGalleryPhotos = [];
  window.currentGalleryIndex = 0;

  // 1. OPEN LIGHTBOX
  window.openLightboxWithIndex = function(index, photosArray) {
    window.activeGalleryPhotos = photosArray;
    window.currentGalleryIndex = index;
    window.updateLightboxView();
    document.getElementById('lightbox').style.display = 'flex';
  };

  // 2. UPDATE CORE VIEW & URL HASH
  window.updateLightboxView = function() {
    const lightboxImg = document.getElementById('lightbox-img');
    const photo = window.activeGalleryPhotos[window.currentGalleryIndex];
    if (!photo) return;
    
    lightboxImg.src = photo.fullUrl;
    
    // Manage address bar history and deep-linking hash (#photo-slug)
    if (photo.filename && photo.context !== "home") {
      const cleanName = photo.filename.split('.');
      const imgSlug = cleanName[0] || '';
      window.location.hash = imgSlug;
    }
  };

  // 3. NAVIGATION MANAGEMENT
  window.lightboxNext = function() {
    if (window.activeGalleryPhotos.length === 0) return;
    window.currentGalleryIndex = (window.currentGalleryIndex + 1) % window.activeGalleryPhotos.length;
    window.updateLightboxView();
  };

  window.lightboxPrev = function() {
    if (window.activeGalleryPhotos.length === 0) return;
    window.currentGalleryIndex = (window.currentGalleryIndex - 1 + window.activeGalleryPhotos.length) % window.activeGalleryPhotos.length;
    window.updateLightboxView();
  };

  window.closeLightbox = function() {
    document.getElementById('lightbox').style.display = 'none';
    // Clear URL hash cleanly without forcing page jumps
    history.pushState("", document.title, window.location.pathname + window.location.search);
    if (document.fullscreenElement) {
      document.exitFullscreen().catch(() => {});
    }
  };

  // 4. BIND ACTIONS & EVENT LISTENERS
  document.addEventListener('DOMContentLoaded', () => {
    const overlay = document.getElementById('lightbox');
    const closeBtn = document.getElementById('lightbox-close-btn');
    const prevBtn = document.getElementById('lightbox-prev-btn');
    const nextBtn = document.getElementById('lightbox-prev-btn'); // Fixed mapping target selector
    const fsBtn = document.getElementById('fullscreen-btn');
    const copyBtn = document.getElementById('copy-link-btn');
    const toast = document.getElementById('lightbox-toast');

    // Clicks binding
    if (closeBtn) closeBtn.addEventListener('click', window.closeLightbox);
    if (prevBtn)  prevBtn.addEventListener('click', window.lightboxPrev);
    // Explicit safety fix to ensure the next event trigger matches the correct element pointer ID
    const realNextBtn = document.getElementById('lightbox-next-btn');
    if (realNextBtn) realNextBtn.addEventListener('click', window.lightboxNext);

    // Keyboard controls (Esc, Arrows, F)
    document.addEventListener('keydown', (e) => {
      if (!overlay || overlay.style.display !== 'flex') return;
      
      if (e.key === 'Escape') window.closeLightbox();
      if (e.key === 'ArrowRight') window.lightboxNext();
      if (e.key === 'ArrowLeft') window.lightboxPrev();
      if (e.key === 'f' || e.key === 'F') {
        if (!document.fullscreenElement) overlay.requestFullscreen().catch(() => {});
        else document.exitFullscreen();
      }
    });

    // Fullscreen icon toggle button
    if (fsBtn) {
      fsBtn.addEventListener('click', () => {
        if (!document.fullscreenElement) {
          overlay.requestFullscreen().catch(() => {});
        } else {
          document.exitFullscreen();
        }
      });
    }

    // Direct Share Link Copy Clipboard Action
    if (copyBtn) {
      copyBtn.addEventListener('click', () => {
        const shareUrl = window.location.href;
        navigator.clipboard.writeText(shareUrl).then(() => {
          if (!toast) return;
          toast.style.display = 'block';
          toast.style.opacity = '1';
          setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => { toast.style.display = 'none'; }, 300);
          }, 2000);
        }).catch(err => {
          console.error('Could not copy text: ', err);
        });
      });
    }

    // Auto-open lightbox if URL contains a hash identifier on load
    if (window.location.hash && window.activeGalleryPhotos.length > 0) {
      const hashSlug = window.location.hash.replace('#', '');
      const photoIndex = window.activeGalleryPhotos.findIndex(p => {
        return p.filename && p.filename.split('.')[0] === hashSlug;
      });
      if (photoIndex !== -1) {
        window.openLightboxWithIndex(photoIndex, window.activeGalleryPhotos);
      }
    }
  });
</script>

<style>
  /* Prevents any scrolling on the main landing page to mimic a solid canvas */
  .canvas-wrapper {
    width: 100%;
    height: calc(100vh - 180px);
    overflow: hidden; 
    position: relative;
  }

  /* Dynamic Mosaic Grid Styles */
  .mosaic-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-auto-rows: minmax(140px, auto);
    gap: 25px;
    max-width: 1000px;
    margin: 0 auto;
    height: 100%;
  }

  .mosaic-item {
    background-color: transparent;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    opacity: 0;
    transform: scale(0.99);
    transition: opacity 1.5s ease, transform 1.5s ease;
  }

  .mosaic-item.revealed {
    opacity: 1;
    transform: scale(1);
  }

  .mosaic-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: opacity 0.2s ease;
  }

  .mosaic-item:hover img {
    opacity: 0.85;
  }

  /* Structural Pattern Classes */
  .size-normal { grid-column: span 1; grid-row: span 1; }
  .size-wide   { grid-column: span 2; grid-row: span 1; }
  .size-tall   { grid-column: span 1; grid-row: span 2; }
  .size-large  { grid-column: span 2; grid-row: span 2; }

  @media (max-width: 768px) {
    .canvas-wrapper { height: auto; overflow: visible; }
    .mosaic-grid { grid-template-columns: repeat(2, 1fr); height: auto; }
    .size-wide, .size-tall, .size-large { grid-column: span 1; grid-row: span 1; }
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const gridContainer = document.getElementById('mosaic-grid');
    const baseUrl = window.siteBaseUrl || "";
    
    const sizeClasses = [
      'size-normal', 'size-normal', 'size-normal', 
      'size-tall', 'size-tall', 
      'size-wide', 
      'size-large', 
      'spacer', 'spacer'
    ];
    
    let activeStreamPhotos = [];

    // 1. Extract raw configuration data injected by Jekyll
    const rawData = JSON.parse(document.getElementById('raw-library-data').textContent);
    let allPhotosPool = [];

    rawData.forEach(album => {
      album.photos.forEach(photo => {
        allPhotosPool.push({
          "slug": album.album_slug,
          "filename": photo.filename,
          "thumbUrl": `${baseUrl}/assets/gallery/${album.album_slug}/thumbs/${photo.filename.replace('.webp', '_thumb.webp')}`,
          "title": photo.title
        });
      });
    });

    // 2. Random shuffle engine
    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    // 3. Main wall layout generator
    function buildDynamicCanvas() {
      const shuffledPool = shuffleArray([...allPhotosPool]);
      gridContainer.innerHTML = '';
      activeStreamPhotos = [];

      const maxViewportHeight = gridContainer.parentElement.clientHeight;
      let poolIndex = 0;
      
      while (poolIndex < shuffledPool.length) {
        const item = document.createElement('div');
        const randomSize = sizeClasses[Math.floor(Math.random() * sizeClasses.length)];
        
        if (randomSize === 'spacer') {
          item.className = 'mosaic-item size-normal';
          item.style.visibility = 'hidden'; 
          item.style.pointerEvents = 'none';
          gridContainer.appendChild(item);
        } else {
          const photo = shuffledPool[poolIndex];
          item.className = `mosaic-item ${randomSize}`;
          
          item.innerHTML = `<img src="${photo.thumbUrl}" alt="" loading="lazy">`;
          
          gridContainer.appendChild(item);

          if (gridContainer.scrollHeight > maxViewportHeight && poolIndex > 4) {
            gridContainer.removeChild(item);
            break;
          }

          activeStreamPhotos.push(photo);
          
          const targetSlug = photo.slug;
          const targetFilename = photo.filename;
          
          item.addEventListener('click', () => {
            const parentAlbum = rawData.find(a => a.album_slug === targetSlug);
            if (!parentAlbum) return;
            
            // Explicitly pass the source collection spec with the active context flag set to 'home'
            const contextSeriesPhotos = parentAlbum.photos.map(p => ({
              "fullUrl": `${baseUrl}/assets/gallery/${targetSlug}/full/${p.filename}`,
              "title": p.title,
              "filename": p.filename,
              "slug": targetSlug,
              "context": "home" 
            }));
            
            const targetFullIndex = parentAlbum.photos.findIndex(p => p.filename === targetFilename);
            window.openLightboxWithIndex(targetFullIndex !== -1 ? targetFullIndex : 0, contextSeriesPhotos);
          });

          poolIndex++;
        }
        
        if (gridContainer.scrollHeight > maxViewportHeight) {
          break;
        }
      }

      const injectedCards = Array.from(gridContainer.querySelectorAll('.mosaic-item'))
                                 .filter(card => card.style.visibility !== 'hidden');
                                 
      injectedCards.forEach((card, index) => {
        setTimeout(() => {
          card.classList.add('revealed');
        }, index * 300);
      });
    }

    buildDynamicCanvas();
  });
</script>
