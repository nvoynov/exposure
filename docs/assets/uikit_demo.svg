<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <!-- Brandbook canvas background -->
  <rect width="800" height="600" fill="#F4F4F5" />

  <!-- DOCUMENT HEADER -->
  <text x="40" y="50" font-family="sans-serif" font-size="24" font-weight="700" fill="#18181B">EXPOSURE GALLERY — UI KIT &amp; BRAND DESIGN</text>
  <text x="40" y="75" font-family="sans-serif" font-size="12" fill="#71717A">Phase 2: High-Fidelity Visual Style Specification (Example Artifact)</text>
  <line x1="40" y1="95" x2="760" y2="95" stroke="#E4E4E7" stroke-width="1" />

  <!-- SECTION 1: COLOR PALETTE -->
  <g transform="translate(40, 130)">
    <text x="0" y="0" font-family="sans-serif" font-size="14" font-weight="600" fill="#18181B">1. Brand Color Palette</text>
    
    <!-- Primary Dark -->
    <rect x="0" y="20" width="100" height="70" fill="#121212" rx="4" stroke="#E4E4E7" />
    <text x="0" y="105" font-family="sans-serif" font-size="11" font-weight="600" fill="#18181B">Primary Dark</text>
    <text x="0" y="120" font-family="sans-serif" font-size="10" fill="#71717A">#121212 (Background)</text>

    <!-- Pure White -->
    <rect x="130" y="20" width="100" height="70" fill="#FFFFFF" rx="4" stroke="#E4E4E7" />
    <text x="130" y="105" font-family="sans-serif" font-size="11" font-weight="600" fill="#18181B">Surface White</text>
    <text x="130" y="120" font-family="sans-serif" font-size="10" fill="#71717A">#FFFFFF (Text/Light)</text>

    <!-- Accent Red (Camera indicator sub-tone) -->
    <rect x="260" y="20" width="100" height="70" fill="#E11D48" rx="4" stroke="#E4E4E7" />
    <text x="260" y="105" font-family="sans-serif" font-size="11" font-weight="600" fill="#18181B">Accent Crimson</text>
    <text x="260" y="120" font-family="sans-serif" font-size="10" fill="#71717A">#E11D48 (Muted Focus)</text>

    <!-- Muted Gray -->
    <rect x="390" y="20" width="100" height="70" fill="#A1A1AA" rx="4" stroke="#E4E4E7" />
    <text x="390" y="105" font-family="sans-serif" font-size="11" font-weight="600" fill="#18181B">Muted Border</text>
    <text x="390" y="120" font-family="sans-serif" font-size="10" fill="#71717A">#A1A1AA (UI Lines)</text>
  </g>

  <!-- SECTION 2: TYPOGRAPHY HIERARCHY -->
  <g transform="translate(40, 310)">
    <text x="0" y="0" font-family="sans-serif" font-size="14" font-weight="600" fill="#18181B">2. Typography System</text>
    
    <text x="0" y="35" font-family="sans-serif" font-size="22" font-weight="300" letter-spacing="2" fill="#121212">Nikolay Voynov. Exposure</text>
    <text x="0" y="55" font-family="sans-serif" font-size="10" fill="#71717A">Header Logo Spec: 22px / Sans-Serif / Light / Tracking 2px</text>

    <text x="0" y="95" font-family="sans-serif" font-size="14" font-weight="600" fill="#121212">[ Album Title Placeholder ]</text>
    <text x="0" y="112" font-family="sans-serif" font-size="10" fill="#71717A">Page Title Spec: 14px / Sans-Serif / Semi-Bold</text>

    <text x="0" y="150" font-family="sans-serif" font-size="11" fill="#444444">Lorem ipsum dolor sit amet, consectetur adipiscing elit...</text>
    <text x="0" y="167" font-family="sans-serif" font-size="10" fill="#71717A">Body Text Spec: 11px / Sans-Serif / Regular / Leading 1.5</text>
  </g>

  <!-- SECTION 3: UI ELEMENTS & BRAND ICONOGRAPHY -->
  <g transform="translate(40, 520)">
    <line x1="0" y1="-20" x2="720" y2="-20" stroke="#E4E4E7" stroke-width="1" />
    <text x="0" y="0" font-family="sans-serif" font-size="14" font-weight="600" fill="#18181B">3. Core UI Components &amp; Identity</text>

    
    <g transform="translate(0, 15)">
      <!-- Mini-version of our custom lens/screen asset -->
      <svg width="32" height="32" viewBox="0 0 32 32">
        <path d="M1,9 V4 H6 M26,4 H31 V9 M31,23 V28 H26 M6,28 H1 V23" fill="none" stroke="#1A1A1A" stroke-width="1" stroke-linecap="round" />
        <circle cx="16" cy="16" r="9" fill="#1A1A1A" fill-opacity="0.12" stroke="#1A1A1A" stroke-width="1.2" />
        <circle cx="16" cy="16" r="5" fill="#FFFFFF" stroke="#1A1A1A" stroke-width="1.2" />
        <line x1="16" y1="11" x2="16" y2="21" stroke="#1A1A1A" stroke-width="1.2" stroke-linecap="round" />
      </svg>
      <text x="45" y="15" font-family="sans-serif" font-size="11" font-weight="600" fill="#18181B">Approved Logo Asset</text>
      <text x="45" y="28" font-family="sans-serif" font-size="10" fill="#71717A">Vector Camera Focus Screen</text>
    </g>

    <!-- Lightbox Controls Specs -->
    <g transform="translate(280, 20)">
      <!-- Normal State Chevron -->
      <path d="M5,5 L15,15 L5,25" fill="none" stroke="#121212" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
      <text x="30" y="13" font-family="sans-serif" font-size="11" font-weight="600" fill="#18181B">Control Chevron</text>
      <text x="30" y="26" font-family="sans-serif" font-size="10" fill="#71717A">Active Navigation State</text>
    </g>

    <g transform="translate(520, 20)">
      <!-- Hover State Chevron (Using our accent color) -->
      <path d="M5,5 L15,15 L5,25" fill="none" stroke="#E11D48" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
      <text x="30" y="13" font-family="sans-serif" font-size="11" font-weight="600" fill="#E11D48">Chevron :hover</text>
      <text x="30" y="26" font-family="sans-serif" font-size="10" fill="#71717A">Interactive Hover State</text>
    </g>
  </g>
</svg>

