<svg xmlns="http://www.w3.org/2000/svg" width="720" height="540" viewBox="0 0 720 540">
  <!-- Content area background wireframe -->
  <rect width="720" height="540" fill="#FFFFFF" />

  <!-- TOP CONTROL INTERFACE (Right-aligned action buttons) -->
  <g transform="translate(560, 20)">
    <!-- 1) "Full Screen" Action Button (Custom focus marks icon) -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="24" height="24" fill="none" />
      <path d="M4,9 V4 H9 M15,4 H20 V9 M20,15 V20 H15 M9,20 H4 V15" fill="none" stroke="#1A1A1A" stroke-width="1.2" stroke-linecap="round" />
      <text x="12" y="36" font-family="sans-serif" font-size="8" text-anchor="middle" fill="#888888">[ Full ]</text>
    </g>

    <!-- 2) "Copy Link" Action Button (Link chain icon) -->
    <g transform="translate(40, 0)">
      <rect x="0" y="0" width="24" height="24" fill="none" />
      <path d="M9,15 A4,4 0 0,1 9,7 H12 M15,9 A4,4 0 0,1 15,17 H12 M8,12 H16" fill="none" stroke="#1A1A1A" stroke-width="1.2" stroke-linecap="round" />
      <text x="12" y="36" font-family="sans-serif" font-size="8" text-anchor="middle" fill="#888888">[ Link ]</text>
    </g>

    <!-- 3) "Close Lightbox" Action Button (Cross icon) -->
    <g transform="translate(80, 0)">
      <rect x="0" y="0" width="24" height="24" fill="none" />
      <line x1="5" y1="5" x2="19" y2="19" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round" />
      <line x1="19" y1="5" x2="5" y2="19" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round" />
      <text x="12" y="36" font-family="sans-serif" font-size="8" text-anchor="middle" fill="#888888">[ Close ]</text>
    </g>
  </g>

  <!-- MAIN LIGHTBOX PHOTOGRAPH (Centered focus area) -->
  <g transform="translate(80, 80)">
    <!-- Thin white border outline around the image canvas -->
    <rect x="0" y="0" width="560" height="380" fill="none" stroke="#EAEAEA" stroke-width="1" />
    
    <!-- Inner image placeholder bounds -->
    <rect x="4" y="4" width="552" height="372" fill="#EEEEEE" stroke="#DDDDDD" rx="2" />
    <text x="280" y="195" font-family="sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#666666">[ ACTIVE FULL-SIZE PHOTO PLACEHOLDER ]</text>
    <text x="280" y="215" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#999999">(Horizontal or Vertical adaptive scale template)</text>
  </g>

  <!-- NAVIGATION CHEVRONS (Symmetric slide control wireframes) -->
  <!-- Left Arrow Button -->
  <g transform="translate(30, 250)">
    <path d="M15,5 L5,15 L15,25" fill="none" stroke="#777777" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  <!-- Right Arrow Button -->
  <g transform="translate(665, 250)">
    <path d="M5,5 L15,15 L5,25" fill="none" stroke="#777777" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
