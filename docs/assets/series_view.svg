<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1140" viewBox="0 0 720 1140">
  <!-- Content area background wireframe -->
  <rect width="720" height="1140" fill="#FFFFFF" />

  <!-- SERIES ENTRY 01: Scattered Left-Aligned Collage -->
  <g transform="translate(40, 40)">
    <!-- 5-Image Dynamic Chaotic Stack -->
    <rect x="30" y="10" width="160" height="110" fill="#EEEEEE" stroke="#DDDDDD" transform="rotate(-3, 110, 65)" />
    <rect x="0" y="40" width="120" height="160" fill="#E5E5E5" stroke="#DDDDDD" transform="rotate(4, 60, 120)" />
    <rect x="110" y="0" width="150" height="110" fill="#DCDCDC" stroke="#DDDDDD" transform="rotate(-1, 185, 55)" />
    <rect x="90" y="60" width="140" height="140" fill="#D2D2D2" stroke="#DDDDDD" transform="rotate(2, 160, 130)" />
    <!-- Top focus image -->
    <rect x="40" y="30" width="170" height="125" fill="#CCCCCC" stroke="#DDDDDD" transform="rotate(-2, 125, 92)" />
    
    <!-- Meta and Typography Info -->
    <text x="125" y="225" font-family="sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#111111">[ SERIES TITLE 01 ]</text>
    <text x="125" y="245" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#666666">[ Dynamic 5-Image Scattered Layout Abstract Text ]</text>
  </g>

  <!-- SERIES ENTRY 02: Scattered Right-Aligned Collage -->
  <g transform="translate(420, 400)">
    <!-- 5-Image Dynamic Chaotic Stack -->
    <rect x="10" y="20" width="150" height="110" fill="#EEEEEE" stroke="#DDDDDD" transform="rotate(3, 85, 75)" />
    <rect x="100" y="0" width="130" height="170" fill="#E5E5E5" stroke="#DDDDDD" transform="rotate(-4, 165, 85)" />
    <rect x="0" y="50" width="160" height="110" fill="#DCDCDC" stroke="#DDDDDD" transform="rotate(1, 80, 105)" />
    <rect x="80" y="60" width="130" height="130" fill="#D2D2D2" stroke="#DDDDDD" transform="rotate(-2, 145, 125)" />
    <!-- Top focus image -->
    <rect x="40" y="30" width="170" height="125" fill="#CCCCCC" stroke="#DDDDDD" transform="rotate(2, 125, 92)" />
    
    <!-- Meta and Typography Info -->
    <text x="125" y="225" font-family="sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#111111">[ SERIES TITLE 02 ]</text>
    <text x="125" y="245" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#666666">[ Dynamic 5-Image Scattered Layout Abstract Text ]</text>
  </g>

  <!-- SERIES ENTRY 03: Scattered Left-Aligned Collage (New Added Block) -->
  <g transform="translate(40, 760)">
    <!-- 5-Image Dynamic Chaotic Stack -->
    <rect x="0" y="10" width="140" height="140" fill="#EEEEEE" stroke="#DDDDDD" transform="rotate(-2, 70, 80)" />
    <rect x="90" y="40" width="160" height="110" fill="#E5E5E5" stroke="#DDDDDD" transform="rotate(3, 170, 95)" />
    <rect x="40" y="0" width="130" height="170" fill="#DCDCDC" stroke="#DDDDDD" transform="rotate(-3, 105, 85)" />
    <rect x="110" y="60" width="120" height="120" fill="#D2D2D2" stroke="#DDDDDD" transform="rotate(1, 170, 120)" />
    <!-- Top focus image -->
    <rect x="40" y="30" width="170" height="125" fill="#CCCCCC" stroke="#DDDDDD" transform="rotate(-1, 125, 92)" />
    
    <!-- Meta and Typography Info -->
    <text x="125" y="225" font-family="sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#111111">[ SERIES TITLE 03 ]</text>
    <text x="125" y="245" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#666666">[ Dynamic 5-Image Scattered Layout Abstract Text ]</text>
  </g>
</svg>
