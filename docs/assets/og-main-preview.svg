<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#FFFFFF" />

  <!-- Asymmetric Exhibition Grid Elements -->
  <rect x="30" y="30" width="400" height="570" fill="#EEEEEE" stroke="#FFFFFF" stroke-width="4" />
  <text x="230" y="315" font-family="sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#888888">[ Vertical Photo 01 (400x570) ]</text>
  <rect x="460" y="30" width="450" height="300" fill="#E5E5E5" stroke="#FFFFFF" stroke-width="4" />
  <text x="685" y="180" font-family="sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#888888">[ Landscape Photo 02 (450x300) ]</text>
  <rect x="460" y="360" width="240" height="240" fill="#DCDCDC" stroke="#FFFFFF" stroke-width="4" />
  <text x="580" y="480" font-family="sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#888888">[ Square 03 ]</text>
  <rect x="720" y="360" width="220" height="240" fill="#D2D2D2" stroke="#FFFFFF" stroke-width="4" />
  <text x="830" y="480" font-family="sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#888888">[ Photo 04 ]</text>
  <rect x="690" y="50" width="480" height="270" fill="#EAEAEA" stroke="#FFFFFF" stroke-width="4" />
  <text x="930" y="185" font-family="sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#666666">[ Large Landscape 05 ]</text>

  <!-- Watermark Overlay with BLACK PROTECTIVE OUTLINE (No central ticks) -->
  <g transform="translate(1100, 530)">
    <!-- BLACK PROTECTIVE BACKING CONTOUR -->
    <g fill="none" stroke="#1A1A1A" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2,18 V8 H8 M56,8 H62 V18 M62,46 V56 H56 M8,56 H2 V46" stroke-width="4" />
      <circle cx="32" cy="32" r="18" stroke-width="4.5" />
      <circle cx="32" cy="32" r="10" stroke-width="4.5" />
      <line x1="32" y1="22" x2="32" y2="42" stroke-width="4.5" />
    </g>
    <!-- FRONT WHITE LENS LOGO ARTWORK -->
    <g fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2,18 V8 H8 M56,8 H62 V18 M62,46 V56 H56 M8,56 H2 V46" stroke-width="1.5" />
      <circle cx="32" cy="32" r="18" fill="#FFFFFF" fill-opacity="0.15" stroke-width="2" />
      <circle cx="32" cy="32" r="10" stroke-width="2" />
      <line x1="32" y1="22" x2="32" y2="42" stroke-width="2" />
    </g>
  </g>
</svg>
