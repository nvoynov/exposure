<svg xmlns="http://www.w3.org/2000/svg" width="720" height="840" viewBox="0 0 720 840">
  <!-- Content area background wireframe -->
  <rect width="720" height="840" fill="#FFFFFF" />

  <!-- SECTION TITLE (Minimalist entry point) -->
  <text x="40" y="50" font-family="sans-serif" font-size="16" font-weight="600" letter-spacing="1" fill="#111111">[ SELECTED WORK / MOSAIC WALL ]</text>

  <!-- TODD HIDO INSPIRED ASYMMETRIC MASONRY GRID (Starts at y=90) -->
  <!-- ROW 1: Large landscape next to a vertical frame -->
  <g transform="translate(40, 90)">
    <!-- Thumbnail 01: Dominant Horizontal Shot -->
    <rect x="0" y="0" width="380" height="240" fill="#EEEEEE" stroke="#FFFFFF" stroke-width="4" rx="1" />
    <text x="190" y="125" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#888888">[ Landscape 01 ]</text>
    
    <!-- Thumbnail 02: Narrow Vertical Shot -->
    <rect x="390" y="0" width="250" height="240" fill="#E5E5E5" stroke="#FFFFFF" stroke-width="4" rx="1" />
    <text x="515" y="125" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#888888">[ Portrait 02 ]</text>
  </g>

  <!-- ROW 2: Triple grid with variable widths and heights -->
  <g transform="translate(40, 340)">
    <!-- Thumbnail 03: Small Square Shot -->
    <rect x="0" y="0" width="180" height="180" fill="#DCDCDC" stroke="#FFFFFF" stroke-width="4" rx="1" />
    <text x="90" y="95" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#888888">[ Square 03 ]</text>
    
    <!-- Thumbnail 04: Medium Cinematic Frame -->
    <rect x="190" y="0" width="270" height="180" fill="#D2D2D2" stroke="#FFFFFF" stroke-width="4" rx="1" />
    <text x="325" y="95" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#888888">[ Cinematic 04 ]</text>
    
    <!-- Thumbnail 05: Small Vertical Shot -->
    <rect x="470" y="0" width="170" height="180" fill="#CCCCCC" stroke="#FFFFFF" stroke-width="4" rx="1" />
    <text x="555" y="95" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#888888">[ Portrait 05 ]</text>
  </g>

  <!-- ROW 3: Reverse asymmetry (Vertical on the left, wide landscape on the right) -->
  <g transform="translate(40, 530)">
    <!-- Thumbnail 06: Tall Vertical Frame -->
    <rect x="0" y="0" width="210" height="270" fill="#E1E1E1" stroke="#FFFFFF" stroke-width="4" rx="1" />
    <text x="105" y="140" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#666666">[ Tall Frame 06 ]</text>
    
    <!-- Thumbnail 07: Large Substantial Landscape -->
    <rect x="220" y="0" width="420" height="270" fill="#EAEAEA" stroke="#FFFFFF" stroke-width="4" rx="1" />
    <text x="430" y="140" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#666666">[ Dynamic Landscape 07 ]</text>
  </g>
</svg>

